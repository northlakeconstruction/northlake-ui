name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '22'
  TERRAFORM_VERSION: '1.9.8'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::300724398050:role/northlake-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
        run: npm run build

      - name: Build OpenNext bundle
        run: npx open-next build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan (informational)
        working-directory: terraform
        run: terraform plan -var="turnstile_secret=${{ secrets.TURNSTILE_SECRET_KEY }}" -no-color
        continue-on-error: true

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -var="turnstile_secret=${{ secrets.TURNSTILE_SECRET_KEY }}"

      - name: Export Terraform outputs
        working-directory: terraform
        run: |
          echo "ASSETS_BUCKET_NAME=$(terraform output -raw assets_bucket_name)" >> $GITHUB_ENV
          echo "CLOUDFRONT_DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_ENV

      - name: Sync static assets to S3 (immutable chunks)
        run: |
          aws s3 sync .open-next/assets/_next/static/ \
            s3://${{ env.ASSETS_BUCKET_NAME }}/_next/static/ \
            --cache-control "public,max-age=31536000,immutable" \
            --delete

      - name: Sync public assets to S3 (images, 30-day cache)
        run: |
          aws s3 sync public/ \
            s3://${{ env.ASSETS_BUCKET_NAME }}/images/ \
            --cache-control "public,max-age=2592000" \
            --exclude "*.jpg" \
            --exclude "*.md" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Output deployment info
        run: |
          echo "✅ Deployment successful!"
          echo "CloudFront domain: $(cd terraform && terraform output -raw cloudfront_domain)"
          echo "S3 bucket: ${{ env.ASSETS_BUCKET_NAME }}"
          echo "Distribution ID: ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}"
